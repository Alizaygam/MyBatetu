<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Batetu ♥️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    opacity:0;
}

.card{
    background:white;
    width:90%;
    max-width:650px;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    position:relative;
    z-index:2;
}

h1{
    color:#ff3d6e;
    margin-bottom:10px;
}

img{
    width:260px;
    height:260px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:opacity 0.6s ease;
}

p{
    color:#555;
    font-size:17px;
    line-height:1.6;
}

button{
    margin-top:15px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:#ff3d6e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff1744;
}

#reason{
    margin-top:20px;
    font-size:22px;
    color:#ff3d6e;
    min-height:60px;
    font-weight:bold;
}

/* Hearts */
.heart{
    position:fixed;
    bottom:-30px;
    color:red;
    animation:float 6s linear forwards;
    opacity:0.8;
}

@keyframes float{
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* Sparkles */
.sparkle{
    position:fixed;
    pointer-events:none;
    animation:fade 2s linear forwards;
}

@keyframes fade{
    from { opacity:1; transform:scale(1); }
    to { opacity:0; transform:scale(1.5); }
}
</style>
</head>

<body>

<div class="card">

<h1>My Batetu ♥️</h1>

<img id="slideshow" src="photo.jpeg">

<p id="letter"></p>

<button onclick="showReason()">Click Me ♥️</button>

<div id="reason"></div>

<audio controls>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

// 💌 Typing Letter
const message = `I know I don't express my love for you enough, but every day I thank Allah for blessing my life with you.
You are my favorite person in this world. No matter what happens, I'll always choose you. ♥️`;

let i = 0;
function typeLetter(){
    if(i < message.length){
        document.getElementById("letter").innerHTML += message[i];
        i++;
        setTimeout(typeLetter, 40);
    }
}
typeLetter();


// 📸 Slideshow
const photos = [
"photo.jpeg",
"photo1.jpeg",
"photo2.jpeg",
"photo3.jpeg",
"photo4.jpeg",
"photo5.jpeg"
];

let index = 0;

setInterval(() => {
    const img = document.getElementById("slideshow");

    img.style.opacity = 0;

    setTimeout(() => {
        index = (index + 1) % photos.length;
        img.src = photos[index];
        img.style.opacity = 1;
    }, 400);

}, 1000);


// 💖 Reasons Button
const reasons = [
"I love your smile 😊",
"I love that you always care for me ❤️",
"You make my days better.",
"You are my safe place.",
"I can't imagine life without you.",
"You are one of the main reasons I could get my PPL.",
"I'll always choose you ♥️",
"Thank you for everything and thank you for always being you."
];

let r = 0;

function showReason(){
    document.getElementById("reason").innerHTML = reasons[r];
    r = (r + 1) % reasons.length;
}


// ❤️ Hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "♥️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 250);


// ✨ Sparkles
setInterval(() => {
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.innerHTML = "✨";

    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";
    sparkle.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}, 600);


// 🌹 Fade in
window.addEventListener("load", () => {
    document.body.style.transition = "opacity 1.5s ease";
    document.body.style.opacity = 1;
});

</script>

</body>
</html>
